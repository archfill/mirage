name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev libdbus-1-dev

      - name: Fetch dependencies
        run: cargo fetch

      - name: Patch winit for Rust 1.94+ compatibility
        run: bash patches/patch-winit.sh

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Lint
        run: cargo clippy --all-targets

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test
